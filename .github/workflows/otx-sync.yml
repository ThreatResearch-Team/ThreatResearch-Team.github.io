name: Sync Indicators to AlienVault OTX

on:
  workflow_dispatch: # Manual trigger only — run from the Actions tab in GitHub

permissions:
  contents: write  # Required so the workflow can commit pulse URLs back to .md files

jobs:
  sync-to-otx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install OTXv2

      - name: Run OTX Sync Script
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: python .github/scripts/otx_sync.py
